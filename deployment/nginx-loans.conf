server {
    listen 80;
    server_name loans.softlinkoptions.me.ke;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name loans.softlinkoptions.me.ke;

    # SSL — managed by certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/loans.softlinkoptions.me.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loans.softlinkoptions.me.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/alba-loans/nginx-access.log;
    error_log  /var/log/alba-loans/nginx-error.log;

    client_max_body_size 20M;

    # Static files served directly by nginx (much faster than Django/whitenoise)
    location /static/ {
        alias /opt/odoo/Alba/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/odoo/Alba/media/;
        # Restrict media access — only authenticated users should get docs
        # (Django handles auth, so we just proxy here)
    }

    # Everything else → Gunicorn
    location / {
        proxy_pass          http://unix:/run/alba-loans.sock;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_redirect      off;
        proxy_read_timeout  120s;
    }
}
