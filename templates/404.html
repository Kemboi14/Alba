<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 &mdash; Page Not Found | Alba Capital</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            "alba-navy": "#1e3a5f",
                            "alba-orange": "#ff6b35",
                        },
                    },
                },
            };
        </script>
        <style>
            .bg-alba-navy {
                background-color: #1e3a5f;
            }
            .text-alba-navy {
                color: #1e3a5f;
            }
            .bg-alba-orange {
                background-color: #ff6b35;
            }
            .text-alba-orange {
                color: #ff6b35;
            }
            .border-alba-orange {
                border-color: #ff6b35;
            }
            .hover-bg-alba-navy:hover {
                background-color: #1e3a5f;
            }
            .hover-bg-alba-orange:hover {
                background-color: #ff6b35;
            }
            .hover-text-white:hover {
                color: #ffffff;
            }
        </style>
    </head>
    <body class="h-full bg-gray-50 flex flex-col">
        <!-- Header / Logo bar -->
        <header class="bg-alba-navy shadow-md">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center">
                <span class="text-2xl font-extrabold tracking-tight text-white">
                    Alba <span class="text-alba-orange">Capital</span>
                </span>
            </div>
        </header>

        <!-- Main content -->
        <main class="flex-1 flex items-center justify-center px-6 py-16">
            <div class="text-center max-w-lg w-full">
                <!-- Decorative divider above number -->
                <div class="flex items-center justify-center gap-3 mb-6">
                    <span
                        class="block h-0.5 w-12 bg-alba-orange rounded-full"
                    ></span>
                    <span
                        class="text-sm font-semibold uppercase tracking-widest text-alba-orange"
                    >
                        Error 404
                    </span>
                    <span
                        class="block h-0.5 w-12 bg-alba-orange rounded-full"
                    ></span>
                </div>

                <!-- Big 404 -->
                <p
                    class="text-[9rem] leading-none font-extrabold text-alba-navy select-none"
                >
                    404
                </p>

                <!-- Title -->
                <h1
                    class="mt-4 text-3xl font-bold text-gray-800 tracking-tight"
                >
                    Page Not Found
                </h1>

                <!-- Message -->
                <p class="mt-4 text-base text-gray-500 leading-relaxed">
                    Sorry, the page you&rsquo;re looking for doesn&rsquo;t exist
                    or has been moved. Double-check the URL, or use one of the
                    options below.
                </p>

                <!-- Buttons -->
                <div
                    class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4"
                >
                    <a
                        href="/"
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-alba-navy text-white text-sm font-semibold shadow-sm transition-opacity hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-alba-navy"
                    >
                        <!-- Home icon -->
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M3 12l2-2m0 0l7-7 7 7m-9 2v8m4-8v8m5-8l2 2"
                            />
                        </svg>
                        Go Home
                    </a>

                    <button
                        onclick="history.back()"
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-lg border-2 border-alba-orange text-alba-orange text-sm font-semibold bg-white shadow-sm transition-colors hover:bg-alba-orange hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-alba-orange"
                    >
                        <!-- Arrow-left icon -->
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M11 17l-5-5m0 0l5-5m-5 5h12"
                            />
                        </svg>
                        Go Back
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200">
            <div
                class="max-w-7xl mx-auto px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-2"
            >
                <p class="text-sm text-gray-400">
                    &copy; 2025
                    <span class="font-medium text-gray-500">Alba Capital</span>.
                    All rights reserved.
                </p>
                <p class="text-sm text-gray-400">
                    Need help?
                    <a
                        href="mailto:support@albacapital.co.ke"
                        class="text-alba-orange hover:underline font-medium"
                    >
                        support@albacapital.co.ke
                    </a>
                </p>
            </div>
        </footer>
    </body>
</html>
