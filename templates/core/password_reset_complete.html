{% extends 'base.html' %} {% block title %}Password Changed — Alba Capital{%
endblock %} {% block body %}
<div
    class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-alba-navy via-[#1a3456] to-[#0f2140] px-4 py-12"
>
    <div class="w-full max-w-md">
        <div
            class="bg-white rounded-2xl shadow-2xl overflow-hidden text-center"
        >
            <div class="px-8 py-10">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-5"
                >
                    <svg
                        class="w-8 h-8 text-green-600"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                        />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">
                    Password changed!
                </h2>
                <p class="text-gray-500 text-sm leading-relaxed">
                    Your password has been successfully updated. You can now
                    sign in with your new password.
                </p>
                <a
                    href="{% url 'login' %}"
                    class="btn btn-primary btn-lg mt-7 inline-flex"
                    >Sign in now
                    <svg
                        class="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M13 7l5 5m0 0l-5 5m5-5H6"
                        /></svg
                ></a>
            </div>
        </div>
        <p class="text-center text-xs text-blue-200/70 mt-6">
            &copy; {% now "Y" %} Alba Capital. All rights reserved.
        </p>
    </div>
</div>
{% endblock %}
